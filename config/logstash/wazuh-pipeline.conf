# Pipeline Logstash — Ingestion logs Wazuh vers Elasticsearch
input {
  beats {
    port => 5044
    ssl => true
    ssl_certificate => "/etc/logstash/certs/logstash.crt"
    ssl_key => "/etc/logstash/certs/logstash.key"
  }
}

filter {
  if [agent][type] == "wazuh" {
    json {
      source => "message"
      target => "wazuh_data"
    }
    
    # Enrichissement géolocalisation IP
    if [data][srcip] {
      geoip {
        source => "[data][srcip]"
        target => "geoip"
      }
    }
    
    # Normalisation timestamp
    date {
      match => ["[wazuh_data][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
    
    # Tag alertes critiques (level >= 10)
    if [rule][level] >= 10 {
      mutate {
        add_tag => ["high_priority", "alert"]
      }
    }
    
    # Mapping MITRE ATT&CK
    if [rule][mitre][id] {
      mutate {
        add_field => { "mitre_technique" => "%{[rule][mitre][id]}" }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["https://localhost:9200"]
    index => "wazuh-alerts-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl => true
    cacert => "/etc/logstash/certs/ca.crt"
  }
}
